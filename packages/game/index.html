<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxelBound</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #app { width: 100%; height: 100%; overflow: hidden; background: #111; }
      canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }
      #hud {
        position: fixed; left: 0; right: 0; bottom: 0;
        padding: 12px 16px;
        font: 14px/1.4 'Courier New', monospace;
        color: #fff;
        text-shadow: 1px 1px 0 #000;
        pointer-events: none;
        display: flex; justify-content: space-between; align-items: flex-end;
      }
      #title {
        position: fixed; top: 16px; left: 16px;
        font: bold 20px 'Courier New', monospace;
        color: #fff; text-shadow: 2px 2px 0 #e8453c;
        pointer-events: none;
      }
      #settings-panel {
        position: fixed; top: 16px; right: 16px;
        background: rgba(0,0,0,0.75);
        border: 2px solid #fff;
        padding: 12px;
        font: 12px 'Courier New', monospace;
        color: #fff;
        min-width: 220px;
        display: none;
      }
      #settings-panel.open { display: block; }
      #settings-panel label { display: flex; justify-content: space-between; margin: 6px 0; gap: 8px; }
      #settings-panel input[type=range] { width: 100px; }
      #settings-toggle {
        position: fixed; top: 16px; right: 16px;
        font: 12px 'Courier New', monospace;
        padding: 6px 10px;
        background: #e8453c; color: #fff; border: 2px solid #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="title">VOXELBOUND</div>
    <button id="settings-toggle" type="button">World Settings</button>
    <div id="settings-panel">
      <div style="margin-bottom:8px;font-weight:bold">World / Graphics</div>
      <label>Camera pitch <input id="pitch" type="range" min="10" max="70" value="35" /></label>
      <label>Camera yaw <input id="yaw" type="range" min="0" max="360" value="45" /></label>
      <label>View height <input id="viewH" type="range" min="80" max="240" value="144" /></label>
      <label>Anim step rate <input id="animRate" type="range" min="1" max="12" step="0.5" value="3" /></label>
      <label>World tick rate <input id="worldRate" type="range" min="30" max="120" value="60" /></label>
      <label>Ambient light <input id="ambient" type="range" min="0" max="100" value="55" /></label>
    </div>
    <div id="hud">
      <span>WASD move · Shift run · E talk (soon)</span>
      <span id="tick-readout">anim: 3 Hz · sim: 60 Hz</span>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
