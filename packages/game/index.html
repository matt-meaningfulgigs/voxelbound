<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxelBound</title>
    <link rel="stylesheet" href="/src/style.css" />
    <style>
      #settings-panel {
        position: fixed; top: 56px; right: 16px;
        background: rgba(0,0,0,0.82); border: 2px solid #fff;
        padding: 12px; font: 12px 'Courier New', monospace; color: #fff;
        min-width: 230px; display: none; z-index: 40;
      }
      #settings-panel.open { display: block; }
      #settings-panel label { display: flex; justify-content: space-between; margin: 6px 0; gap: 8px; }
      #settings-panel input[type=range] { width: 110px; }
      #settings-toggle {
        position: fixed; top: 16px; right: 16px;
        font: 11px 'Courier New', monospace; padding: 6px 10px;
        background: #e8453c; color: #fff; border: 2px solid #fff;
        cursor: pointer; z-index: 41; display: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <button id="settings-toggle" type="button">World Settings</button>
    <div id="settings-panel">
      <div style="margin-bottom:8px;font-weight:bold">World / Graphics</div>
      <label>Camera pitch <input id="pitch" type="range" min="10" max="70" value="40" /> <span id="pitch-val">40°</span></label>
      <label>Camera yaw <input id="yaw" type="range" min="0" max="360" value="0" /> <span id="yaw-val">0°</span></label>
      <label>View height <input id="viewH" type="range" min="80" max="360" value="150" /> <span id="viewH-val">150</span></label>
      <label>Anim step rate <input id="animRate" type="range" min="1" max="12" step="0.5" value="3" /></label>
      <label>World tick rate <input id="worldRate" type="range" min="30" max="120" value="60" /></label>
      <label>Ambient light <input id="ambient" type="range" min="0" max="100" value="55" /></label>
    </div>
    <div id="ui"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
